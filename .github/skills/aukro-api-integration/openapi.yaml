openapi: 3.0.3
info:
  title: Aukro Public API
  description: 'Aukro Public API provides means for sale on the Aukro portal. Unlike
    its predecessor webAPI, it does not provide any functionality for both bidding
    and buying.


    Aukro Public API relies on **REST architecture depending** on HTTPS protocol and
    UTF-8 content encoding. The format for the data transferred is JSON. Each HTTP
    request has to contain Content-Type: application/json header.'
  version: '2.0'
servers:
- description: Development server
  url: https://be.djp.aukro.cloud/backend-web/api/v2
- description: Production server
  url: https://aukro.cz/api/v2
