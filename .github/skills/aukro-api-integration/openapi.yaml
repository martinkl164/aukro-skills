- name: Authentication
  description: '

    ## API Key


    Please note that the API in this documentation cannot be accessed without a valid
    API key.

    To use the API, you must first obtain an API key from us. Without a valid key,
    you will not be able to make requests to the API.

    '
- name: Offers
  description: "Offers is an interface for offers managements.\n\n## Type of offers\n\
    \n### Auction\n\nOffer that is sold to the highest bidder.\n\n### Buy now\n\n\
    Offer that is available for immediate purchase.\n\n### Combined offer\n\nOffer\
    \ that is both Buy now offer and Auction. If bid is placed on the offer, it is\
    \ transitioned to Auction.\nOn the other hand, if the offer is purchased through\
    \ the Buy Now option, the item is deemed unavailable for further bidding or purchasing,\n\
    as it is limited to a quantity of one.\n\n## Creating offers\n\nThere are two\
    \ ways of creating offers on the Aukro portal:\n\n- creating offers based on JSON\
    \ payload - <a href=\"/#tag/Offers/operation/createNewOfferV2\">POST /offers-v2</a>\n\
    \n- creating offers from a CSV or JSON file - <a href=\"/#tag/Offers/operation/createNewOffersImportV2\"\
    >POST /offers-v2</a>\n\n## Offer currency\n\nTo specify currencies in request\
    \ headers and body parameters, use three-character <a href=\"https://en.wikipedia.org/wiki/ISO_4217#Active_codes\"\
    >ISO-4217 code</a>.\n\nDuring offer creation, the currency selection is tied to\
    \ the domain where the user account is registered.\nFor read-only endpoints, this\
    \ selection is not restricted.\n\n<table>\n  <thead>\n    <tr>\n      <th>Currency</th>\n\
    \      <th>Code</th>\n      <th>Max Decimal places (Offer creation)</th>\n   \
    \   <th>Use When Account is Registered On</th>\n    </tr>\n  </thead>\n  <tbody>\n\
    \    <tr>\n      <td>Czech koruna</td>\n      <td>CZK</td>\n      <td>0</td>\n\
    \      <td><a href=\"https://aukro.cz/\">aukro.cz</a</td>\n    </tr>\n    <tr>\n\
    \      <td>Euro</td>\n      <td>EUR</td>\n      <td>2</td>\n      <td><a href=\"\
    https://aukro.sk/\">aukro.sk</a</td>\n    </tr>\n    <tr>\n      <td>Forint</td>\n\
    \      <td>HUF</td>\n      <td>-1 ( rounded to tens )</td>\n      <td><a href=\"\
    https://aukro.hu/\">aukro.hu</a</td>\n    </tr>\n  </tbody>\n</table>\n\n## Offer\
    \ language\n\nTo specify language in request headers and body parameters, use\
    \ <a href=\"https://en.wikipedia.org/wiki/IETF_language_tag\">BCP-47 language\
    \ tag</a>.\n\nDuring offer creation, the language selection is tied to the domain\
    \ where the user account is registered.\nFor read-only endpoints, this selection\
    \ is not restricted.\n\n<table>\n  <thead>\n    <tr>\n      <th>Language</th>\n\
    \      <th>Country</th>\n      <th>BCP-47 Code</th>\n      <th>Use When Account\
    \ is Registered On</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>Czech</td>\n\
    \      <td>Czech Republic</td>\n      <td>cs-CZ</td>\n      <td><a href=\"https://aukro.cz/\"\
    >aukro.cz</a</td>\n    </tr>\n    <tr>\n      <td>Slovak</td>\n      <td>Slovak\
    \ Republic</td>\n      <td>sk-SK</td>\n      <td><a href=\"https://aukro.sk/\"\
    >aukro.sk</a</td>\n    </tr>\n    <tr>\n      <td>Hungarian</td>\n      <td>Hungary</td>\n\
    \      <td>hu-HU</td>\n      <td><a href=\"https://aukro.hu/\">aukro.hu</a</td>\n\
    \    </tr>\n    <tr>\n      <td>Croatian</td>\n      <td>Croatia</td>\n      <td>hr-HR</td>\n\
    \      <td><a href=\"https://aukro.hr/\">aukro.hr</a</td>\n    </tr>\n    <tr>\n\
    \      <td>Slovenian</td>\n      <td>Slovenia</td>\n      <td>sl-SI</td>\n   \
    \   <td><a href=\"https://aukro.si/\">aukro.si</a</td>\n    </tr>\n  </tbody>\n\
    </table>\n\n## Offer description\n\nThe offer description is a detailed description\
    \ of subject being offered for sale.\nTo ensure its responsiveness and appropriate\
    \ presentation on mobile devices, Aukro\nhas introduced some restrictions on the\
    \ description format.\n\n\nBasically, offer description is an HTML enabled text\
    \ with a maximum length of 65,000 characters including HTML. However, the HTML\
    \ is not full-fledged one, but it is restricted to limited set of elements. The\
    \ following HTML elements are allowed in the offer description:\n\n- `h2` for\
    \ section title\n\n- `p` for paragraphs\n\n- `strong` for bold text\n\n- `ol`\
    \ and `li` for ordered lists\n\n- `ul` and `li` for unordered lists\n\n\nThere\
    \ are also restrictions to the structure of offer description. The offer description\
    \ consists of so-called blocks of various types that can be combined together.\
    \ Basic text formatting can also be used inside the blocks.\n\nThe root of HTML\
    \ description must be always a `div` element with class `aukro-offer-default`.\
    \ It is then possible to use several defined blocks with the `data-layout` attribute\
    \ inside. Furthermore, it is possible to use 4 types of content formatting. \n\
    \n### Offer description format\n\nThis is a text with support for allowed HTML\
    \ tags with a maximum length of 65,000 characters including HTML. This is not\
    \ full-fledged html, but a limited set of elements. The offer description consists\
    \ of so-called blocks (there may be several of different types below one another).\
    \ Basic text formatting can also be used inside the blocks.\n\nHTML must always\
    \ be wrapped in a div element with class `aukro-offer-default`. In it, it is then\
    \ possible to use several defined blocks\nwith the `data-layout` attribute and\
    \ a value according to the block type. Furthermore, it is possible to use 4 types\
    \ of content formatting.\n\nExample:\n```html\n<div class=\"aukro-offer-default\"\
    >\n    <div data-layout=\"text\">\n        <div>\n          <p>text</p>\n    \
    \    </div>\n    </div>\n  </div>\n```\n\n### Block type\n\n- pure text\n```html\n\
    <div class=\"aukro-offer-default\">\n    <div data-layout=\"text\">\n      <div>\n\
    \          <p>text</p>\n      </div>\n    </div>\n</div>\n```\n- image only\n\
    ```html\n<div class=\"aukro-offer-default\">\n    <div data-layout=\"image\">\n\
    \      <div>\n          <img src=\"https://f.aukro.cz/images/0\">\n      </div>\n\
    \    </div>\n</div>\n```\n- photo on the left + text on the right\n```html\n<div\
    \ class=\"aukro-offer-default\">\n  <div data-layout=\"text-image\">\n      <div>\n\
    \          <p>text</p>\n      </div>\n      <div>\n          <img src=\"https://f.aukro.cz/images/0\"\
    >\n      </div>\n    </div>\n</div>\n```\n- text on the left + photo on the right\n\
    ```html\n<div class=\"aukro-offer-default\">\n    <div data-layout=\"image-text\"\
    >\n      <div>\n          <img src=\"https://f.aukro.cz/images/0\">\n      </div>\n\
    \      <div>\n          <p>text</p>\n      </div>\n    <div>\n</div>\n```\n- 2\
    \ photos side by side\n```html\n<div class=\"aukro-offer-default\">\n    <div\
    \ data-layout=\"image-image\">\n      <div>\n          <img src=\"https://f.aukro.cz/images/0\"\
    >\n      </div>\n      <div>\n          <img src=\"https://f.aukro.cz/images/1\"\
    >\n      </div>\n    </div>\n</div>   \n```\n\n### Text formatting\n\n- 2 types\
    \ of heading\n```html\n<h2>Heading 2 text</h2>\n```\n- bold text\n```html\n<strong>Strong\
    \ text</strong>\n```\n- numbered bullet points\n```html\n<ol><li>First li</li><li>Second\
    \ li</li></ol>\n```\n- unnumbered bullet points\n```html\n<ul><li>First li</li><li>Second\
    \ li</li></ul>\n```\n\n## Offer images\n\nEvery offer is required to include at\
    \ least one title image. You can provide this image in one of two ways: \n\n-\
    \ Uploading the image file directly\n\n- Supplying a URL that points to the image\
    \  \n\nSupported file formats are JPEG (`.jpg`, `.jpeg`, `.jfif`), PNG (`.png`),\
    \ WebP (`.webp`), and GIF (`.gif`).\n\n### Image via URL\n\nWhen you provide an\
    \ image URL, the Aukro system first sends a `HEAD` request. The target server\
    \ must respond with `200 OK` and include both\n`Content-Type` and `Content-Length`\
    \ headers. Only after validating the format and size does the system download\
    \ the image with a `GET` request.\nBoth requests are subject to timeouts, so ensure\
    \ the server responds in a timely manner.\n\nIf your URLs point to images generated\
    \ on demand (e.g., by a CDN), pre-warm those URLs before submitting your request;\
    \ this improves processing\ntime and reduces the risk of timeouts and missing\
    \ required headers (such as `Content-Type` and `Content-Length`).\n\n## Offer\
    \ states\n\nList of all states the offer can be in during its lifecycle.\n\n###\
    \ SCHEDULED\nOffer has been created by seller but has a delayed starting time,\
    \ therefore is visible to the seller only. It will transition to `ACTIVE`\nat\
    \ specified starting time.\n\n### ACTIVE\nOffer is visible to other users and\
    \ can be bid on or bought.\n\n### ENDED\nOffer is still visible to other users\
    \ but can no longer be bid on or bought.\n\n### SCHEDULED_PUBLIC\nOffer is not\
    \ yet available for bidding nor buying, but can be visited and seen by other users.\n\
    \n### SCHEDULED_ACTIVE\nOffer is visible to other users and can be bid on or bought.\
    \ Same as `ACTIVE` except that the state cannot transition into `ENDED` directly.\n"
- name: Webhooks
  description: "Webhooks are HTTP POST notifications that Aukro sends to your server\
    \ when specific events occur. Use them to receive near-real-time updates\nabout\
    \ activity in your Aukro account—for example, when a bid is placed on your auction\
    \ or when a buyer submits an order.\n\n## Delivery settings and event subscriptions\n\
    \nProvide Aukro with your HTTPS endpoint URL (the destination for webhook POST\
    \ requests). After the endpoint is configured, explicitly subscribe\nto the event\
    \ types you want to receive; only subscribed events are delivered.\n\n## Webhook\
    \ calls\n\nAukro sends webhooks as HTTP POST requests to your configured URL with\
    \ a JSON payload. Any `2xx` response is considered a successful delivery. \nEach\
    \ request has a 2-second timeout; design your handler to acknowledge quickly (you\
    \ can process work asynchronously after responding).\n\n### Security\n\nTo ensure\
    \ request authenticity, Aukro includes an `Authorization` header whose value is\
    \ the one you specified when creating\n<a href=\"/#tag/Webhooks/operation/createUserWebhookSettings\"\
    >Webhook Settings</a>.\n\n### Source IP addresses (for allowlisting)\n\nWebhook\
    \ deliveries originate from Aukro’s static egress IP addresses. If you protect\
    \ your endpoint with a firewall, WAF, or DDoS mitigation,\nallowlist the following\
    \ source IPs to ensure delivery:\n\n- **Production:** `185.175.85.228`\n- **Development:**\
    \ `185.175.85.227`\n\n## Retries, dropouts, and replay\n\nIf Aukro does not receive\
    \ a `2xx` response to a notification request, or cannot connect to your server,\
    \ it will retry up to 6 times with the\nfollowing backoff:\n\n<ul>\n  <li>1st\
    \ retry after 10 minutes</li>\n  <li>2nd retry after 20 minutes</li>\n  <li>3rd\
    \ retry after 30 minutes</li>\n  <li>4th retry after 1 hour</li>\n  <li>5th retry\
    \ after 2 hours</li>\n  <li>6th retry after 4 hours</li>\n</ul>\n\nIf all attempts\
    \ fail, Aukro will retain the notification event object on its side for a limited\
    \ period of 2 weeks.\n\nAfter webhook functionality is restored by a third party,\
    \ it can \\\"replay\\\" stored undelivered notifications\nby calling <a href=\"\
    /#tag/Webhooks/operation/replayFailedWebhookEvents\">POST /webhook/event/failed/replay</a>.\
    \ \nThis call queues any undelivered notifications to be sent again to the third-party\
    \ endpoint, which can process them in the standard way.\n\nNote that webhook events\
    \ that you later unsubscribe from will still be attempted for delivery and will\
    \ be included in replay.\n\n## Generic notification structure\n\nAll notifications\
    \ contain an event object in the following envelope:\n\n\n```json\n  {\n    eventId:\
    \ EventId,\n    events: [Event1, …, EventN]\n  }\n```\n\n\nwhere\n\n* `events`\
    \ is a list of objects of *the same event* in currently supported versions for\
    \ backwards compatibility (see below)\n\n* _EventX_ is always\n\n```json\n  {\n\
    \    eventType: EventType,\n    eventTimestamp: EventTimestamp,\n    eventDetail:\
    \ EventDetailDto\n  }\n```\n\n\nwhere\n\n- _EventId_ - event id, UUID4\n\n- _EventType_\
    \ - the type of event to which the notification relates\n\n  - types are versioned\
    \ by suffix `_vX`, where _X_ is the major version number (usually breaking) and\
    \ Aukro does not version nonbreaking changes\n\n  - ensuring backward compatibility\
    \ in case of transitions to the breaking version, the notification will always\
    \ contain both versions of the event for a limited time; time will be used to\
    \ switch from a lower version to a higher one\n\n- _EventTimestamp_ - timestamp\
    \ of the moment when the event to which the notification refers occurred\n  -\
    \ it is not a timestamp of the moment, sending the notification\n\n  - ISO 8601\
    \ form\n\n- _EventDetailDto_ - it is a JSON object whose schema is determined\
    \ by the eventType value\n"
