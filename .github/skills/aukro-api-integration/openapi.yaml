      - Offers
      summary: List user's offers
      description: 'Use this resource to get current user''s paged offers.


        ### Sorting and filtering


        #### Sort

        Sort query parameter must be in this format: **property_ORDER**. Order is
        either ASC(ascending) or DESC(descending). The default sort returns items
        from newest to oldest.


        #### Status

        The listed offers can be filtered by item states. Items can be in one of these
        states: `ACTIVE`, `SCHEDULE`, `SCHEDULED_PUBLIC`, `SCHEDULED_ACTIVE` or `ENDED`.

        The default option for filtering when status property is null or empty is
        same as filtering by all states, so it returns every valid offer in the system
        for a given user.

        For example, when status is set to `ACTIVE` and `ENDED`, only active and ended
        offers will be listed.

        '
