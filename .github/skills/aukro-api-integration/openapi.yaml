x-webhooks:
  item-expired:
    get:
      tags:
      - Webhooks
      summary: Item Expired
      operationId: itemExpired
      description: 'Event `itemExpired_v1` occurs when the offer expires either time-wise
        or the stock has been sold out. If it is an auction-type offer, it must be
        fulfilled that no bid has been registered for it. Note at the end of the auction
        with a bid, the `itemWon` event is generated.


        Offers are terminated in batches at minute intervals. The event will contain
        the id of all items that were terminated within a single batch.


        As a result of the expiration, the offer ceases to be available for bidding
        (in the case of auctions) or purchase (in the case of buy now).

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemExpired'
      security: []
  item-created-v1:
    get:
      tags:
      - Webhooks
      summary: Item Created
      operationId: itemCreated
      description: 'Event `itemCreated_v1` occurs when an offer is created i.e. offer
        that entered Aukro system.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemCreatedV1'
      security: []
  item-exposed-v1:
    get:
      tags:
      - Webhooks
      summary: Item Exposed
      operationId: itemExposed
      description: 'Event `itemExposed_v1` occurs when an offer is exposed i.e. offer
        that transitioned to state `ACTIVE`.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemExposedV1'
      security: []
  item-reexposed:
    get:
      tags:
      - Webhooks
      summary: Item Reexposed
      operationId: itemReexposed
      description: 'Event `itemReexposed_v1` occurs when the offer has been re-exposed.


        Offers are re-exposed automatically if it is set by the parameters during
        offer creation. The moment of automatic re-exposure is either when

        their current lifecycle has reached an end (transition from `ACTIVE` to `ENDED`)
        or the stock has been sold out.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemReexposed'
      security: []
  item-won:
    get:
      tags:
      - Webhooks
      summary: Item Won
      operationId: itemWon
      description: 'Event `itemWon_v1` occurs when the duration of the auction offer
        expires and at least one valid bid is recorded for it - this means that someone
        won the auction (actually bought). Event is limited to auction with bids only.


        It is true that for each auction at its end either an `itemExpired` event
        (no bid) or an `itemWon` event (there is a bid) is generated.


        Offers are terminated in batches at minute intervals. The event will contain
        the ids of all auctions that ended in a win within one batch.


        The details of who won the auction, how they wish to pay and ship the goods
        are not part of this event (shipping and payment are not even known at that
        time) and will be part of the `newOrderSubmitted` event.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemWon'
      security: []
  item-won-expired:
    get:
      tags:
      - Webhooks
      summary: Item Won Expired
      operationId: itemWonExpired
      description: 'The `itemWonExpired_v1` event occurs when the time for the buyer
        to complete the shipping and payment details for a winning auction expires.
        This is a timed fallback to when the `newOrderSubmitted` event does not occur
        due to the buyer not filling in the necessary data.


        The event will only occur if the seller has set automatic withdrawal from
        the contract, in accordance with Article 3.3.8 of the Aukra GTC. This event
        can therefore occur no earlier than 7 days after the auction is won (`itemWon`).
        However, within the setting of automatic withdrawal from the contract, the
        seller can choose interval longer than 7 days.


        Event is limited to auction with bids only.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemWonExpired'
      security: []
  item-terminated:
    get:
      tags:
      - Webhooks
      summary: Item Terminated
      operationId: itemTerminated
      description: 'Event `itemTerminated_v1` occurs when an offer is terminated by
        Aukro before the proper expiration time.


        Offers can be terminated in bulk. In that case, the event will contain ids
        of all offers that were terminated within one batch.


        As a result of the termination, the offer ceases to be available for bidding
        (in the case of auctions) or purchase (in the case of buy now).

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemTerminated'
      security: []
  new-order-submitted-v3:
    get:
      tags:
      - Webhooks
      summary: New Order Submitted v3
      operationId: newOrderSubmittedV3
      description: 'Event `newOrderSubmitted_v3` occurs when the user completes the
        checkout process (shopping cart), the last step of which is the confirmation
        of

        sending the order. All currencies are those of the seller i.e. not the currencies
        of the buyer.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventNewOrderSubmittedV3'
      security: []
  order-stopped-by-buyer:
    get:
      tags:
      - Webhooks
      summary: Order - Stopped By Buyer
      operationId: orderStoppedByBuyer
      description: 'The `orderStoppedByBuyer_v1` event is triggered when the buyer
        halts the order payment due to issues with the order that necessitate resolution

        between the buyer and the seller. After the dispute is solved, state changes
        based on the outcome of the dispute.

        <br>

        <br>

        [Payment via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderStoppedByBuyerV1'
      security: []
  order-payment-returned-to-buyer:
    get:
      tags:
      - Webhooks
      summary: Order - Payment Returned To Buyer
      operationId: orderPaymentReturnedToBuyer
      description: 'The `orderPaymentReturnedToBuyer_v1` event is triggered when the
        payment is returned to the buyer - seller does not receive money. This is
        final

        state of the order payment.

        <br>

        <br>

        [Payment via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderPaymentReturnedToBuyerV1'
      security: []
  order-not-paid:
    get:
      tags:
      - Webhooks
      summary: Order - Not Paid
      operationId: orderNotPaid
      description: "The `orderNotPaid_v1` event is triggered when the order has not\
        \ been paid by the buyer after elapsed time. The payment in no longer to be\
        \ expected. \nThis is final state of the order payment.\n<br>\n<br>\n[Payment\
        \ via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)\n"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderNotPaidV1'
      security: []
  order-received-payment-split:
    get:
      tags:
      - Webhooks
      summary: Order - Received Payment Split
      operationId: orderReceivedPaymentSplit
      description: 'The `orderReceivedPaymentSplit_v1` event is triggered when the
        received order payment has been split between the buyer and the seller. This
        is

        final state of the order payment.

        <br>

        <br>

        [Payment via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderReceivedPaymentSplitV1'
      security: []
  order-paid:
    get:
      tags:
      - Webhooks
      summary: Order - Paid
      operationId: orderPaid
      description: 'The `orderPaid_v1` event is triggered when Aukro receives payment
        for the order.

        <br>

        <br>

        [Payment via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderPaid'
      security: []
  order-received:
    get:
      tags:
      - Webhooks
      summary: Order - Received
      operationId: orderReceived
      description: 'The `orderReceived_v1` event occurs when buyer confirms that the
        goods have arrived.

        <br>

        <br>

        [Payment via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderReceived'
      security: []
  order-paid-out:
    get:
      tags:
      - Webhooks
      summary: Order - Paid Out
      operationId: orderPaidOut
      description: 'The `orderPaidOut_v1` event is triggered when the seller is about
        to receive the payment for the order. This is final state of the order payment.

        <br>

        <br>

        [Payment via Aukro FAQ](https://aukro.cz/kontakt/platba-pres-aukro-prodejce)

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOrderPaidOutV1'
      security: []
  item-bid-v3:
    get:
      tags:
      - Webhooks
      summary: Item Bid v3
      operationId: itemBidV3
      description: 'Event `itemBid_v3` occurs when an offer is bid on. Currency of
        the `amount` is the currency of the seller i.e. not the currency of the bidder.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventItemBidV3'
      security: []
  cancel-bid-v2:
    get:
      tags:
      - Webhooks
      summary: Cancel Bid v2
      operationId: cancelBidV2
      description: 'Event `cancelBid_v2` occurs when a bid is cancelled. Currency
        of the `currentPrice` is the currency of the seller i.e. not the currency
        of

        the bidder.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventCancelBidV2'
      security: []
  packet-ordered-v1:
    get:
      tags:
      - Webhooks
      summary: Packet - Ordered
      operationId: packetOrderedV1
      description: 'Event `packetOrdered_v1` occurs when a packet has been successfully
        registered at the carrier.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventPacketOrderedV1'
      security: []
  packet-new-label-v1:
    get:
      tags:
      - Webhooks
      summary: Packet - New Label
      operationId: packetNewLabelV1
      description: 'Event `packetNewLabel_v1` occurs when the packet has received
        a shipping label that needs to be attached to the packet.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventPacketNewLabelV1'
      security: []
  packet-failed-v1:
    get:
      tags:
      - Webhooks
      summary: Packet - Failed
      operationId: packetFailedV1
      description: 'Event `packetFailed_v1` occurs when the packet could not be registered
        at the carrier.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventPacketFailedV1'
      security: []
components:
  securitySchemes:
    bearer-key:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer token in following format: Bearer [TOKEN]

        '
    api-key:
      type: apiKey
      name: X-Aukro-Api-Key
      in: header
      description: API Key from Aukro
  schemas:
    WebhookEventRoot:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventWrapper'
    OffersV2BulkRequest:
      type: object
      properties:
        offers:
          type: array
          items:
            $ref: '#/components/schemas/OffersV2BulkRequestElement'
    OffersV2BulkResponse:
      type: object
      properties:
        offers:
          type: array
          items:
            $ref: '#/components/schemas/OffersV2BulkResponseElement'
    PublicApiImageSizesUrl:
      title: PublicApiImageSizesUrl
      description: URLs of particular sizes of the image.
      type: object
      properties:
        smallSizeUrl:
          title: Small size url
          type: string
        mediumSizeUrl:
          title: Medium size url
          type: string
        largeSizeUrl:
          title: Large size url
          type: string
    OfferResponseImages:
      type: object
      properties:
        title:
          title: Is image a title image
          type: boolean
        sizes:
          $ref: '#/components/schemas/PublicApiImageSizesUrl'
    OfferResponseVideo:
      type: object
      required:
      - url
      description: 'Video for offer

        '
      properties:
        url:
          title: Video URL
          type: string
          format: url
          description: 'URL of the video to be displayed with the offer.

            '
    PublicApiItemStateEnum:
      title: status
      type: string
      enum:
      - ACTIVE
      - SCHEDULE
      - ENDED
      - SCHEDULED_PUBLIC
      - SCHEDULED_ACTIVE
    MonetaryAmount:
      type: object
      properties:
        amount:
          title: Amount of money in specified currency.
          type: number
        currency:
          title: Three-character ISO-4217 currency code. Not all currencies are supported
          type: string
          minLength: 3
          maxLength: 3
    OfferResponseCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
    OfferResponseLocation:
      required:
      - city
      - countryCode
      - postCode
      type: object
      properties:
        city:
          title: City
          type: string
        postCode:
          title: Postal code
          type: string
        countryCode:
          title: Country code
          type: string
    OfferResponseAttributes:
      type: object
      required:
      - id
      description: 'Attribute of offer. If the attribute is of type `combobox` or
        `checkbox`, then the option selected for the attribute is in field `selectedId`.
        If

        the attribute is of any other type, then the user provided value is in field
        `value`.

        '
      properties:
        id:
          title: Item attribute Id
          type: integer
          format: int64
        value:
          type: string
        selectedId:
          type: array
          items:
            title: Id of attribute value
            type: integer
            format: int64
    OfferDataResponse:
      type: object
      properties:
        itemId:
          type: integer
          format: int64
          description: 'Id of offer.

            '
        itemExtId:
          type: string
          description: 'External Id of offer.

            '
        name:
          type: string
          description: 'Name of offer.

            '
        description:
          type: string
          description: 'Description of offer.

            '
        images:
          type: array
          items:
            $ref: '#/components/schemas/OfferResponseImages'
        videos:
          type: array
          items:
            $ref: '#/components/schemas/OfferResponseVideo'
        status:
          $ref: '#/components/schemas/PublicApiItemStateEnum'
        auctionPrice:
          $ref: '#/components/schemas/MonetaryAmount'
        buyNowPrice:
          $ref: '#/components/schemas/MonetaryAmount'
        retailPrice:
          $ref: '#/components/schemas/MonetaryAmount'
        availableQuantity:
          type: integer
          format: int32
          description: 'Quantity that is currently available.

            '
        category:
          type: array
          items:
            $ref: '#/components/schemas/OfferResponseCategory'
        shippingTemplateId:
          type: integer
          format: int64
          description: 'Shipping template Id.

            '
        duration:
          type: integer
          format: int64
          description: 'Offer duration in days.

            '
        location:
          $ref: '#/components/schemas/OfferResponseLocation'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/OfferResponseAttributes'
        reexposeType:
          type: integer
          format: int64
          description: 'Variant of reexpose setting.

            '
        startingAt:
          type: string
          format: date-time
          description: 'Datetime when offer started / will start.

            '
        endingAt:
          type: string
          format: date-time
          description: 'Datetime when offer ends.

            '
        createTime:
          type: string
          format: date-time
          description: 'Datetime when offer entered Aukro system.

            '
        bestOffer:
          type: boolean
          description: 'Indicates whether best offer is enabled for this offer.

            '
        onlyVerifiedBuyersEnabledOverride:
          type: boolean
          description: 'Indicates whether the inversion of only verified buyer setting
            is enabled.

            '
        priorityListing:
          type: boolean
          description: 'Indicates whether priority listing is enabled on this offer.

            '
        boldTitle:
          type: boolean
          description: 'Indicates whether bold title is enabled on this offer.

            '
        highlight:
          type: boolean
          description: 'Indicates whether highlight is enabled on this offer.

            '
    PublicApiItemAttributeDto:
      required:
      - id
      type: object
      description: 'It is used to fill in the parameters of the offer. There are different
        parameters that must / can be filled in through the categories. There are
        multiple attribute types. There are attributes where the value is created
        by the user (e.g. product code) and the "value" parameter must be used. There
        are also attributes where one or more values can be selected (e.g. product
        status) and these are entered using the ID of the selected values in the "selectedId"
        parameter.

        '
      properties:
        id:
          title: Item attribute Id
          type: integer
          format: int64
          maxLength: 3
          minLength: 3
        value:
          title: Attribute value
          type: string
          description: "Value set by seller. <br>\nIf not filled selectedId, then\
            \ mandatory. \n"
        selectedId:
          type: array
          description: 'ID of predefined attribute(s) values. <br>

            If value is not filled, then mandatory. <br>

            In the case of attributes that allow only a limited number of values,
            there is validation for the amount as well.

            '
          items:
            title: Id of attribute value
            type: integer
            format: int64
    OffersQuantityUnitEnum:
      title: Quantity unit
      type: string
      enum:
      - PIECES
      - SETS
      - PAIRS
    OffersV2PatchRequest:
      type: object
      properties:
        name:
          title: Offer name
          type: string
          nullable: true
          minLength: 3
          maxLength: 70
          description: Name of the offer
        description:
          title: Multiline item description
          type: string
          nullable: true
          description: It is created using a limited set of HTML tags in a defined
            structure.  How to create an offer description is described in the chapter
            [Offer description  format](/#tag/Offers/Offer-description).
        additionalDescription:
          title: Additional description
          type: string
          nullable: true
          description: Text to append to description. Plain text only.
        categoryId:
          title: Item category
          type: integer
          format: int64
          nullable: true
          description: Id of an existing category on Aukro. The list of current categories
            and their ids are available ( [here](https://aukro.cz/mapa-kategorii)
            ). You can get IDs with endpoint ( [GET /categories](/#tag/Categories/operation/categoriesAll)
            ).
        attributes:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PublicApiItemAttributeDto'
          description: 'List of offer attributes. Available attributes may differ
            for different categories. At least mandatory attributes within the listed
            category must be filled. You can get attributes for given category with
            endpoint ( [GET /categories/{id}/attributes](#tag/Categories/operation/categoryAttributes)
            ). '
        auctionPrice:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/MonetaryAmount'
        buyNowPrice:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/MonetaryAmount'
        retailPrice:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/MonetaryAmount'
        quantity:
          title: Quantity
          type: integer
          format: int32
          description: Value represents actual number of items available to sell.
            Minimum value is 1.
          nullable: true
        quantityUnit:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OffersQuantityUnitEnum'
      description: Properties for PATCH operations on offer
    ErrorSeverityEnum:
      type: string
      enum:
      - INFO
      - WARNING
      - ERROR
    RestErrorMessage:
      type: object
      properties:
        severity:
          $ref: '#/components/schemas/ErrorSeverityEnum'
        message:
          type: string
          description: Description of the error.
        code:
          type: string
          description: Code of the error.
        field:
          type: string
          description: Field the error is related to.
        additionalInfo:
          type: string
          description: Additional info about the error.
    RestError:
      type: object
      properties:
        uuid:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RestErrorMessage'
        timestamp:
          type: string
          format: date
    OfferTerminateRequest:
      type: object
      properties:
        auctionCancelBids:
          description: For auctions only. Defaults to `false` i.e. existing bids won't
            be cancelled and auction will be evaluated.
          type: boolean
          nullable: true
        auctionCancelBidsReason:
          description: For auctions only. Required when `auctionCancelBids` is `true`.
          type: string
          nullable: true
          minLength: 3
          maxLength: 150
    PublicApiResponseOfferFormDto:
      type: object
      properties:
        entityId:
          type: integer
          format: int64
          description: 'Id of a single CSV record, that this object refers to. CSV
            records are explicitly identified

            to provide exact feedback.

            '
        offerId:
          type: integer
          format: int64
          description: "Id of offer that was created during an import. This id shall\
            \ be used in any \nsubsequent manipulation with this offer.\n"
        status:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RestErrorMessage'
      description: Response DTO of imported offer
    PublicApiResponseOfferImportDto:
      type: object
      properties:
        code:
          title: Id of import
          type: string
          format: UUID
          description: Import Id that can be used to get its status.
        offers:
          type: array
          description: 'List of statuses of particular import items.

            '
          items:
            $ref: '#/components/schemas/PublicApiResponseOfferFormDto'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RestErrorMessage'
      description: Response DTO with offer data for public API
    OfferV2RequestLocation:
      required:
      - city
      - countryCode
      - postCode
      type: object
      description: 'Determines where the seller is from. It is used when searching
        for the user''s offers in his area and also in case the seller provides personal
        collection.

        '
      properties:
        city:
          title: City
          maxLength: 150
          minLength: 2
          pattern: '[\p{L}\d.''\s\-\u2013/]+'
          type: string
        postCode:
          title: Postal code
          type: string
          description: 'Postal code with correct format in respect to the provided
            country

            '
        countryCode:
          title: Country code
          type: string
          maxLength: 2
          minLength: 2
          description: 'Country code, currently only CZ, SK and PL are allowed

            '
    OfferV2RequestAttributes:
      required:
      - id
      type: object
      description: 'Used to fill in the attributes of the offer. There are different
        attributes that must / can be filled in through the categories. There are

        multiple attribute types. There are attributes where the value is created
        by the user (for e.g. product code) and the "value" parameter must be used.

        There are also attributes where one or more values can be selected (for e.g.
        product status) and these are entered using the ID of the selected

        values in the "selectedId" parameter.

        '
      properties:
        id:
          title: Item attribute Id
          type: integer
          format: int64
        value:
          title: Attribute value
          type: string
          description: 'Custom attribute value. Use this field for attributes of type:
            `string`, `integer`, `float`, `tag`.

            '
        selectedId:
          type: array
          description: 'Id(s) of predefined attribute values. Use this field for attributes
            of type: `combobox` or `checkbox`

            '
          items:
            title: Id of attribute value
            type: integer
            format: int64
    OfferV2RequestImage:
      type: object
      description: 'Image for offer. Either `id` or `url` is required. They are both
        mutually exclusive.

        '
      properties:
        id:
          title: Image id
          type: integer
          format: int64
          description: 'Id of image obtained from response of `/images` endpoint

            '
        url:
          title: Image URL
          type: string
          format: url
          description: 'URL of image that will be downloaded

            '
    OfferV2RequestVideo:
      type: object
      required:
      - url
      description: 'Video for offer

        '
      properties:
        url:
          title: Video URL
          type: string
          format: url
          description: 'URL of the video to be displayed with the offer.

            '
    OfferV2Request:
      required:
      - name
      - language
      - description
      - quantity
      - categoryId
      - shippingTemplateId
      - duration
      - images
      - location
      type: object
      properties:
        name:
          title: Offer name
          type: string
          minLength: 3
          maxLength: 70
          description: Name of the offer
        description:
          title: Multiline offer description
          type: string
          description: It is created using a limited set of HTML tags in a defined
            structure.  How to create an offer description is described in the chapter
            Offer description  format.
        language:
          type: string
          format: BCP-47 standard
          description: Primary language of the offer
        auctionPrice:
          $ref: '#/components/schemas/MonetaryAmount'
        buyNowPrice:
          $ref: '#/components/schemas/MonetaryAmount'
        retailPrice:
          $ref: '#/components/schemas/MonetaryAmount'
        quantity:
          title: Number of items in stock.
          type: integer
          minimum: 1
          description: Auctions or Combined offers must have value of 1 only.
          format: int32
        categoryId:
          title: Offer category
          type: integer
          description: Id of an existing category on Aukro. The list of current categories
            and their ids are available ( [here](https://aukro.cz/mapa-kategorii)
            ). You can get IDs with endpoint ( [GET /categories](/#tag/Categories/operation/categoriesAll)
            ).
          format: int64
        shippingTemplateId:
          title: Id of predefined delivery price list
          type: integer
          format: int64
          description: Id of a shipping template associated with the user account
            to be used for shipping option for the created offer. Shipping templates
            are managed via web in ( [Moje Aukro administration section](https://aukro.cz/moje-aukro/muj-prodej/sablona-prepravy)
            ),   you can also get ID of shipping template there. You can get IDs with
            endpoint ( [GET  shipping-templates](#tag/Shipping-Templates/operation/getShippingTemplates)
            ).
        duration:
          title: Offer exposure length
          type: integer
          format: int64
          description: Possible values are 3, 5, 7, 10 or 30. The value 30 can only
            be used for a buy now only offer.
        location:
          $ref: '#/components/schemas/OfferV2RequestLocation'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/OfferV2RequestAttributes'
          description: 'List of offer attributes. Available attributes differ for
            different categories. At least mandatory attributes within the listed
            category must

            be filled. You can get attributes for given category with endpoint ([GET
            /categories/{id}/attributes](#tag/Categories/operation/categoryAttributes)
            ).

            '
        reexposeType:
          title: Item reexpose type
          description: "Possible values are 0, 1 or 2. \n\nValue 0: No auto-renew/re-expose.\n\
            \nValue 1: Auction will be prolonged until it is won. After that the same\
            \ offer \nis listed as new one. The buy-now offer will be relisted with\
            \ the original quantity\nafter it's sold out.  \n\nValue 2: Auction will\
            \ be prolonged until it is won. After that no action\nis done. The buy-now\
            \ offer will be prolonged with remaining units until it's\nsold out.\"\
            \n"
          type: integer
          format: int64
        startingAt:
          title: date and time when the offer will be made publicly available
          description: If not present, then activation is immediate. Otherwise, it
            must specify a moment in the future when the offer is to be made public.
          type: string
          format: date-time
        bestOffer:
          title: Indicates whether the offer has enabled best offer feature
          type: boolean
          description: 'Best offer feature enables buyer to offer a price to the seller  even
            if the offer is still running. By auctions the possibility to offer a
            price is withdrawn after the first bid is placed.

            The licitation between seller and buyer is done via web in Moje Aukro
            administration section and is not supported by this API at the moment.'
        onlyVerifiedBuyersEnabledOverride:
          title: Inverts global only verified buyers enabled setting
          type: boolean
          description: Overrides the setting that, when set, allows only verified
            buyers who have their account fully activated to make bids and purchases
            on current user's offers. If override is set to true, it INVERTS this
            setting for this offer only.
        images:
          type: array
          items:
            $ref: '#/components/schemas/OfferV2RequestImage'
          minItems: 1
          maxItems: 24
          description: Images for this offer. Number of images depends on category
            where offer is exposed. Available on EP <a href="/#tag/Categories/operation/categoriesAll"><strong>GET
