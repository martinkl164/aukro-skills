      - in: query
        name: page
        schema:
          title: number of page
          type: integer
          format: int32
          default: 0
          minimum: 0
      - in: query
        name: size
        schema:
          title: size of the page
          type: integer
          format: int32
          default: 60
          maximum: 60
          minimum: 1
      - in: query
        name: sort
        schema:
          title: sort
          type: array
          items:
            $ref: '#/components/schemas/OffersV2ListSortEnum'
