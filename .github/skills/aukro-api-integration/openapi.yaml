paths:
  /offers/{id}:
    get:
      tags:
      - Offers
      summary: Offer Data
      description: 'Get data about offer. You must be owner of this offer.

        '
      operationId: getOffer
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Id of offer
          type: integer
          format: int64
      - $ref: '#/components/parameters/XAcceptLanguageHeader'
      - $ref: '#/components/parameters/XAcceptCurrencyHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferDataResponse'
      security:
      - bearer-key: []
        api-key: []
  /offers-v2/{id}:
    patch:
      tags:
      - Offers
      summary: Offer update
      description: "To update an offer, its status must be one of the following: `ACTIVE`,\
        \ `SCHEDULE`, `SCHEDULED_PUBLIC`, or `SCHEDULED_ACTIVE`.\nOffers with status\
        \ `ENDED` cannot be updated.\n\n### Restrictions and guidelines for patchable\
        \ properties\n\n#### Name\nThe name cannot be changed if the offer already\
        \ has bids or purchases.\n\n#### Description\nThe description cannot be changed\
        \ if the offer already has any bids or purchases. However, you can append\
        \ plain text to the existing description\nusing the `additionalDescription`\
        \ field.\n\n#### Category\nThe category cannot be changed if 12 hours have\
        \ passed since the start of the offer or if the offer already has any bids\
        \ or purchases. When\nupdating the category, you must also provide attributes.\n\
        \n#### Attributes\nThe attributes cannot be changed if the offer already has\
        \ any bids or purchases.\n\n#### Auction price\nThis is the new starting price\
        \ for an Auction or Combined offer.\n- Restrictions\n  - For Auctions, the\
        \ starting price cannot be changed if the Auction already has bids.\n  - If\
        \ the updated offer is Buy Now offer, it cannot be set if the offer already\
        \ has purchases.\n  - In the case of a Combined offer, the new price must\
        \ not be higher than the Buy Now price.\n- Guidelines\n  - If the updated\
        \ offer is a Buy Now offer with no purchases, it becomes a Combined offer.\
        \ Should the updated Buy Now offer have a quantity\n  greater than 1, it will\
        \ automatically be set to 1.\n  - If the offer is a Combined offer and the\
        \ new price is 0, the offer transitions to Buy now offer.\n\n#### Buy Now\
        \ price\nThis is the new price for a Buy now offer or Combined offer.\n- Restrictions\n\
        \  - If the updated offer is an Auction, it cannot be set if it already has\
        \ bids.\n  - The new price must be higher than the Auction price in the case\
        \ of a Combined offer.\n- Guidelines\n  - When applied to Auction that has\
        \ no bids, the offer transitions to a Combined offer.\n  - If the offer is\
        \ a Combined offer and the new price is 0, the offer transitions to Auction.\n"
      operationId: patchOfferV2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OffersV2PatchRequest'
        required: true
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Id of offer to update
          type: integer
          format: int64
      responses:
        '204':
          description: Properties were updated
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'
        '417':
          $ref: '#/components/responses/417'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
      security:
      - bearer-key: []
        api-key: []
  /offers/{id}/terminate:
    post:
      tags:
      - Offers
      summary: Offer terminate
      description: 'Use this resource to terminate a single offer (item) that is in
        one of these states: `ACTIVE`, `SCHEDULE`, `SCHEDULED_PUBLIC`, `SCHEDULED_ACTIVE`.

        Offers in `SCHEDULE` state will be completely deleted. Offers in state `ENDED`
        cannot be terminated as they have already

        reached end of their lifecycle. Offers in the remaining states will be transitioned
        to `ENDED`.


        #### Auctions

        When terminating auction that has bids, its bids may be cancelled by setting
        property `auctionCancelBids` to `true`. When this is the case,

        the bids will be cancelled and current highest bidder will not become a winner.
        In this case, reason for cancellation must be

        given (`auctionCancelBidsReason`). If value is `false` and auction has bids,
        it will be evaluated (current highest bidder becomes a winner).


        #### Buy now offers

        No special rules currently apply.

        '
      operationId: terminateOffer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferTerminateRequest'
        required: true
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Id of offer to terminate
          type: integer
          format: int64
      responses:
        '200':
          description: Offer was terminated
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'
        '417':
          $ref: '#/components/responses/417'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
      security:
      - bearer-key: []
        api-key: []
  /offers-import-v2:
    post:
      tags:
      - Offers
      summary: Create new offers from file
      description: "Use this resource to list offers based on data in file. The file\
