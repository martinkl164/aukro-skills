      required:
      - entityId
      - offer
      properties:
        entryId:
          type: integer
          description: Entry Id, unique within the batch request
        offer:
          $ref: '#/components/schemas/OfferV2Request'
    OffersV2BulkResponseElement:
      type: object
      properties:
        entryId:
          type: integer
          description: The Id of the request entry this entry responds to.
        offer:
          $ref: '#/components/schemas/OfferV2Response'
  parameters:
    XAcceptLanguageHeader:
      in: header
      name: X-Accept-Language
      schema:
        type: string
        format: BCP-47 standard
        default: cs-CZ
      required: false
    XAcceptCurrencyHeader:
      in: header
      name: X-Accept-Currency
      schema:
        title: Three-character ISO-4217 currency code. Not all currencies are supported
        type: string
        minLength: 3
        maxLength: 3
        default: CZK
      required: false
  responses:
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    '417':
      description: Expectation Failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    '503':
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
    409_webhook_settings_not_present:
      description: Webhook settings not present
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
