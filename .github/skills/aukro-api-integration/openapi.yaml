        \ ... image_8_url\"</td>\n      <td>YES, at least 1 image</td>\n      <td></td>\n\
        \    </tr>\n    <tr>\n      <td>videos</td>\n      <td>Optional list of videos\
        \ for the offer. A maximum of one video is allowed. Only YouTube videos are\
        \ supported. Video usage requires user-account flag to be enabled.</td>\n\
        \      <td>JSON array of objects</td>\n      <td><a href=\"/#tag/models/OfferV2RequestVideo\"\
        >specification</a></td>\n      <td>NO</td>\n    <td></td>\n    </tr>\n   \
        \ <tr>\n      <td>bestOffer</td>\n      <td></td>\n      <td>boolean</td>\n\
        \      <td></td>\n      <td>NO</td>\n      <td>false</td>\n    </tr>\n   \
        \ <tr>\n      <td>onlyVerifiedBuyersEnabledOverride</td>\n      <td>Override\
        \ for current onlyVerifiedBuyersEnabled setting</td>\n      <td>boolean</td>\n\
        \      <td></td>\n      <td>NO</td>\n      <td>false</td>\n    </tr>\n   \
        \ <tr>\n      <td>attributes</td>\n      <td></td>\n      <td>JSON array of\
        \ objects</td>\n      <td><a href=\"/#tag/models/PublicApiItemAttributeDto\"\
        >specification</a></td>\n      <td>YES, for mandatory attributes (in specific\
        \ categories)</td>\n      <td></td>\n    </tr>\n    <tr>\n      <td>priorityListing</td>\n\
        \      <td>Indicates whether the offer should be listed with priority. Service\
        \ is <a href=\"https://aukro.cz/stranka/propagace-a-vylepsovani-nabidek\"\
        >charged</a>.</td>\n      <td>boolean</td>\n      <td></td>\n      <td>NO</td>\n\
